name: Build APK

# Builds the installable app in the cloud whenever you push code,
# or when you trigger it manually from the GitHub "Actions" tab.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # These come from repo secrets. When present, the build is signed with
      # your fixed key so app updates install over the old version and keep
      # your data. When absent, the normal debug key is used.
      SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Decode signing keystore
        if: ${{ env.SIGNING_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upi.jks"
          echo "KEYSTORE_FILE=$RUNNER_TEMP/upi.jks" >> "$GITHUB_ENV"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: upi-expense-tracker-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
